server {
    listen 80;
    server_name localhost;

    # Serve built static React files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls directly to the Flask Backend container
    location /api {
        proxy_pass http://backend:5001/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # HTTP/1.1 and persistent connection configuration for SSE (Server-Sent Events)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        
        # Disable buffering and caching to allow real-time streaming of events and logs
        proxy_buffering off;
        proxy_cache off;
        
        # Increase timeouts to prevent dropping active SSE streams
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Custom error handling page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
