services:
  # 1. PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: lavbench_db
    restart: always
    entrypoint: >
      sh -c '
        mkdir -p /app/logs && chmod 1777 /app/logs &&
        /usr/local/bin/docker-entrypoint.sh "$$@" 2>&1 | tee /app/logs/postgresql.log
      ' --
    command: >
      postgres
      -c max_connections=500
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lavbench_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lavbench_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - logs_data:/app/logs
    # No host port — accessible via Docker network (db:5432)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-lavbench_user} -d ${POSTGRES_DB:-lavbench_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Redis Message Broker for Celery Queue
  redis:
    image: redis:alpine
    container_name: lavbench_redis
    restart: always
    entrypoint: >
      sh -c '
        mkdir -p /app/logs && chmod 1777 /app/logs &&
        /usr/local/bin/docker-entrypoint.sh "$$@" 2>&1 | tee /app/logs/redis.log
      ' --
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    # Exposed on all interfaces for remote workers — protected by REDIS_PASSWORD
    # Override bind with: REDIS_BIND=127.0.0.1 in .env for local-only access
    ports:
      - "${REDIS_BIND:-0.0.0.0}:6379:6379"
    volumes:
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 3. Flask API Backend
  backend:
    build: ./backend
    container_name: lavbench_backend
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://lavbench_user:${POSTGRES_PASSWORD}@db:5432/lavbench_db}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      - HF_CACHE_DIR=/app/hf_cache
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:80}
      - WORKER_PUBLIC_KEY=${WORKER_PUBLIC_KEY:?WORKER_PUBLIC_KEY must be set in .env}
      - REDIS_SSL_CA_CERTS=${REDIS_SSL_CA_CERTS:-}
      - REDIS_SSL_CERTFILE=${REDIS_SSL_CERTFILE:-}
      - REDIS_SSL_KEYFILE=${REDIS_SSL_KEYFILE:-}
      - REDIS_SSL_CERT_REQS=${REDIS_SSL_CERT_REQS:-required}
      - MAIN_SERVER_URL=${MAIN_SERVER_URL:-http://frontend:80}
      - BACKUPS_DIR=/backups
    ulimits:
      nofile:
        soft: ${GUNICORN_ULIMIT_NOFILE:-65536}
        hard: ${GUNICORN_ULIMIT_NOFILE:-65536}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - hf_cache:/app/hf_cache
      - uploads_data:/app/uploads
      - backups_data:/backups
      - logs_data:/app/logs
      - ./certs:/etc/ssl/certs/redis:ro
      - ./guides:/guides:ro
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 4. Celery Beat (watchdog + backup scheduler)
  celery_beat:
    build: ./backend
    container_name: lavbench_beat
    restart: always
    command: celery -A tasks.celery beat --loglevel=info -s /app/run/celerybeat-schedule.db
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://lavbench_user:${POSTGRES_PASSWORD}@db:5432/lavbench_db}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      - HF_CACHE_DIR=/app/hf_cache
      - REDIS_SSL_CA_CERTS=${REDIS_SSL_CA_CERTS:-}
      - REDIS_SSL_CERTFILE=${REDIS_SSL_CERTFILE:-}
      - REDIS_SSL_KEYFILE=${REDIS_SSL_KEYFILE:-}
      - REDIS_SSL_CERT_REQS=${REDIS_SSL_CERT_REQS:-required}
      - BACKUPS_DIR=/backups
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - ./certs:/etc/ssl/certs/redis:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A tasks.celery inspect ping --timeout 5 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 5. Celery Worker (internal/system tasks worker only)
  celery_worker:
    build: ./backend
    container_name: lavbench_worker
    restart: always
    command: sh -c 'celery -A tasks.celery worker --loglevel=info -Q celery -c $${CELERY_WORKER_CONCURRENCY:-2}'
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://lavbench_user:${POSTGRES_PASSWORD}@db:5432/lavbench_db}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      - HF_CACHE_DIR=/app/hf_cache
      - REDIS_SSL_CA_CERTS=${REDIS_SSL_CA_CERTS:-}
      - REDIS_SSL_CERTFILE=${REDIS_SSL_CERTFILE:-}
      - REDIS_SSL_KEYFILE=${REDIS_SSL_KEYFILE:-}
      - REDIS_SSL_CERT_REQS=${REDIS_SSL_CERT_REQS:-required}
      - BACKUPS_DIR=/backups
      - INTERNAL_ONLY_WORKER=true
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/backups
      - logs_data:/app/logs
      - ./certs:/etc/ssl/certs/redis:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'celery.*worker' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # 6. React Frontend & Nginx Router
  frontend:
    build: ./frontend
    container_name: lavbench_frontend
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c '
        mkdir -p /app/logs && chmod 1777 /app/logs &&
        exec nginx -g "daemon off;"
      '
    volumes:
      - logs_data:/app/logs
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  hf_cache:
  uploads_data:
  backups_data:
  logs_data:
