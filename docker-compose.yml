services:
  # 1. PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: lavbench_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lavbench_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lavbench_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lavbench_user} -d ${POSTGRES_DB:-lavbench_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Redis Message Broker for Celery Queue
  redis:
    image: redis:alpine
    container_name: lavbench_redis
    restart: always
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory 256mb --maxmemory-policy allkeys-lru
        else
          echo "REDIS_PASSWORD is required in .env" && exit 1
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 3. Flask API Backend
  backend:
    build: ./backend
    container_name: lavbench_backend
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://lavbench_user:${POSTGRES_PASSWORD}@db:5432/lavbench_db}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - HF_CACHE_DIR=/app/hf_cache
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:80}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - hf_cache:/app/hf_cache
      - uploads_data:/app/uploads
      - backups_data:/backups
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 4. Celery Beat (watchdog + backup scheduler)
  celery_beat:
    build: ./backend
    container_name: lavbench_beat
    restart: always
    command: celery -A tasks.celery beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://lavbench_user:${POSTGRES_PASSWORD}@db:5432/lavbench_db}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - HF_CACHE_DIR=/app/hf_cache
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks.celery inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 5. React Frontend & Nginx Router
  frontend:
    build: ./frontend
    container_name: lavbench_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  hf_cache:
  uploads_data:
  backups_data:
