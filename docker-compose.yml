version: '3.8'

services:
  # 1. PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: nai_db
    restart: always
    environment:
      POSTGRES_USER: nai_user
      POSTGRES_PASSWORD: nai_password
      POSTGRES_DB: nai_competition
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nai_user -d nai_competition"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Redis Message Broker for Celery Queue
  redis:
    image: redis:alpine
    container_name: nai_redis
    restart: always
    command: redis-server --requirepass redis_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 3. Flask API Backend
  backend:
    build: ./backend
    container_name: nai_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://nai_user:nai_password@db:5432/nai_competition
      - CELERY_BROKER_URL=redis://:redis_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:redis_password@redis:6379/0
      - SECRET_KEY=nai-super-secret-key-1337-secure-random-length-for-jwt
      - WORKER_SECRET_KEY=replace-with-secure-worker-token
      - HF_CACHE_DIR=/app/hf_cache
      - CORS_ORIGINS=http://localhost:80
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:5001"
    volumes:
      - hf_cache:/app/hf_cache
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/api/challenges || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 4. Celery GPU Worker Node (reuses same python image)
  celery_worker:
    build: ./backend
    container_name: nai_celery_worker
    restart: always
    command: celery -A tasks.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://nai_user:nai_password@db:5432/nai_competition
      - CELERY_BROKER_URL=redis://:redis_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:redis_password@redis:6379/0
      - SECRET_KEY=nai-super-secret-key-1337-secure-random-length-for-jwt
      - WORKER_SECRET_KEY=replace-with-secure-worker-token
      - HF_CACHE_DIR=/app/hf_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - hf_cache:/app/hf_cache
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks.celery inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 4b. Celery Beat (watchdog scheduler)
  celery_beat:
    build: ./backend
    container_name: nai_celery_beat
    restart: always
    command: celery -A tasks.celery beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://nai_user:nai_password@db:5432/nai_competition
      - CELERY_BROKER_URL=redis://:redis_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:redis_password@redis:6379/0
      - SECRET_KEY=nai-super-secret-key-1337-secure-random-length-for-jwt
      - WORKER_SECRET_KEY=replace-with-secure-worker-token
      - HF_CACHE_DIR=/app/hf_cache
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 5. React Frontend & Nginx Router
  frontend:
    build: ./frontend
    container_name: nai_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  hf_cache:
  uploads_data:
