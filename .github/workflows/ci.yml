name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLASK_ENV: testing
  SECRET_KEY: "ci-test-key-which-is-at-least-32-characters-long"
  ENCRYPTION_KEY: "tVG8-i368hyvsKNRoBKqZIXuExByVbQgKrUHKvqNFis="
  DATABASE_URL: "sqlite:///:memory:"
  REDIS_URL: "redis://localhost:6379/0"

jobs:
  backend-tests:
    name: Backend tests + coverage
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: pip install -r backend/requirements.txt -r backend/dev-requirements.txt
      - run: python -m pytest backend/tests/ -n auto -v --timeout=120 --cov=backend --cov-report=xml --cov-report=term-missing
        env:
          REDIS_URL: "redis://localhost:6379/0"
          DATABASE_URL: "sqlite:///:memory:"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          include-hidden-files: true

  backend-lint:
    name: Backend lint & format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.19
      - run: ruff check .
        working-directory: backend
      - run: ruff format --check .
        working-directory: backend
      - name: Error code checker
        run: python backend/scripts/check_error_codes.py

  backend-types:
    name: Backend type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: pip install -r backend/requirements.txt -r backend/dev-requirements.txt
      - run: mypy backend/ --no-incremental
        working-directory: backend

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  frontend-format:
    name: Frontend format (prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend

  frontend-tests:
    name: Frontend tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run test:coverage
        working-directory: frontend
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          include-hidden-files: true

  translations-check:
    name: Translations consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m json.tool frontend/public/locales/en/translation.json > /dev/null
      - run: python -m json.tool frontend/public/locales/bg/translation.json > /dev/null
      - name: Check translation key parity
        run: python frontend/scripts/check_translations.py

  frontend-types:
    name: Frontend type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run check-types
        working-directory: frontend

  docker-build:
    name: Docker build + full stack smoke test
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-test-password
      REDIS_PASSWORD: ci-redis-pass
      SECRET_KEY: ci-secret-key-0000000000000000000000
      ENCRYPTION_KEY: tVG8-i368hyvsKNRoBKqZIXuExByVbQgKrUHKvqNFis=
      WORKER_PUBLIC_KEY: unused-in-ci-worker-public-key-placeholder
      SERVER_ADDRESS: localhost
      MAIN_SERVER_URL: http://localhost:5001
    steps:
      - uses: actions/checkout@v7

      # --- Build images ---
      - run: docker build -t lavbench-backend backend/
      - run: docker build -t lavbench-frontend frontend/

      # --- Report image sizes to catch bloat ---
      - run: docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}' | grep lavbench

      # --- Start full stack ---
      - name: Start services
        run: |
          mkdir -p certs
          docker compose -f docker-compose.yml up -d

      - name: Wait for all services healthy
        run: |
          for svc in lavbench_db lavbench_redis lavbench_backend lavbench_frontend; do
            echo "Waiting for $svc..."
            for i in $(seq 1 45); do
              sleep 2
              status=$(docker inspect --format='{{.State.Health.Status}}' "$svc" 2>/dev/null)
              [ "$status" = "healthy" ] && break
            done
            if [ "$status" != "healthy" ]; then
              echo "FAILED: $svc is $status (expected healthy)"
              docker logs "$svc" --tail 30
              exit 1
            fi
            echo "$svc is healthy"
          done

      # --- Verify all containers are still running (no crashes) ---
      - name: Check all containers up
        run: |
          RUNNING=$(docker ps --format '{{.Names}} {{.Status}}')
          echo "Running containers:"
          echo "$RUNNING"
          EXPECTED="lavbench_db lavbench_redis lavbench_backend lavbench_beat lavbench_worker lavbench_frontend"
          for name in $EXPECTED; do
            echo "$RUNNING" | grep -q "^$name " || {
              echo "FAILED: $name is not running";
              docker logs "$name" --tail 20 2>/dev/null;
              exit 1;
            }
          done

      # --- Verify backend health endpoint ---
      - name: Health endpoint
        run: |
          echo "=== /api/health ==="
          curl -sS http://localhost:80/api/health | python3 -c "
          import json, sys
          body = json.load(sys.stdin)
          assert body.get('status') == 'ok', 'status is ' + str(body.get('status'))
          checks = body.get('checks', {})
          for name in ('database', 'redis', 'disk'):
              assert 'error' not in str(checks.get(name, '')), f'{name} check failed: {checks[name]}'
          print(json.dumps(body, indent=2))
          print('All health checks passed')
          "

      # --- Verify frontend serves the SPA ---
      - name: Frontend check
        run: |
          STATUS=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:80/)
          [ "$STATUS" = "200" ] || { echo "Frontend returned $STATUS"; exit 1; }
          curl -sS http://localhost:80/ | grep -q '<div id="root"' || {
            echo 'Frontend HTML missing <div id="root">';
            exit 1;
          }
          echo "Frontend is serving the SPA (HTTP 200)"

      # --- Clean up ---
      - name: Clean up
        if: always()
        run: docker compose -f docker-compose.yml down --volumes

  docs-build:
    name: Build Sphinx documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r docs/requirements.txt
      - name: Build Sphinx
        env:
          API_SPEC_SKIP_FETCH: "true"
        run: cd docs && make html
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sphinx-docs
          path: docs/build/
