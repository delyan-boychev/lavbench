name: LavBench CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-tests:
    name: Backend Pytest
    runs-on: ubuntu-latest
    
    # Spin up throwaway DB and Redis containers for the tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: dbname
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Pytest
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/dbname
          CELERY_BROKER_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key_that_is_at_least_32_characters_long_for_security
          ENCRYPTION_KEY: test_encryption_key_that_is_long_enough
        run: |
          cd backend
          python -m pytest tests/ -v

  frontend-tests:
    name: Frontend Vitest & Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run unit tests (Vitest)
        run: |
          cd frontend
          npm run test

      - name: Run type checking
        run: |
          cd frontend
          npm run check-types

      - name: Set up Python for translation scripts
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check translations integrity
        run: |
          cd frontend
          python3 scripts/check_translations.py
