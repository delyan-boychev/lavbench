name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLASK_ENV: testing
  SECRET_KEY: ci-test-key
  DATABASE_URL: "sqlite:///:memory:"
  REDIS_URL: "redis://localhost:6379/0"
  WORKER_SECRET_KEY: ci-worker-secret

jobs:
  backend-tests:
    name: Backend tests + coverage
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: pip install -r backend/requirements.txt -r backend/dev-requirements.txt
      - run: python -m pytest backend/tests/ -v --timeout=120 --cov=backend --cov-report=xml --cov-report=term-missing
        env:
          REDIS_URL: "redis://localhost:6379/0"
          DATABASE_URL: "sqlite:///:memory:"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          include-hidden-files: true

  backend-security:
    name: Backend security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r backend/ -c backend/pyproject.toml

  backend-format:
    name: Backend format (black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black
      - run: black --check --config backend/pyproject.toml backend/

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  frontend-format:
    name: Frontend format (prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend

  frontend-tests:
    name: Frontend tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run test:coverage
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          include-hidden-files: true

  translations-check:
    name: Translations consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m json.tool frontend/public/locales/en/translation.json > /dev/null
      - run: python -m json.tool frontend/public/locales/bg/translation.json > /dev/null
      - name: Check translation key parity
        run: |
          python3 -c "
          import json, sys
          with open('frontend/public/locales/en/translation.json') as f:
              en = json.load(f)
          with open('frontend/public/locales/bg/translation.json') as f:
              bg = json.load(f)
          def flatten(d, prefix=''):
              items = {}
              for k, v in d.items():
                  key = f'{prefix}.{k}' if prefix else k
                  if isinstance(v, dict):
                      items.update(flatten(v, key))
                  else:
                      items[key] = v
              return items
          en_flat = flatten(en)
          bg_flat = flatten(bg)
          en_keys = set(en_flat.keys())
          bg_keys = set(bg_flat.keys())
          missing_bg = en_keys - bg_keys
          missing_en = bg_keys - en_keys
          if missing_bg:
              print(f'Keys missing in bg ({len(missing_bg)}):')
              for k in sorted(missing_bg):
                  print(f'  {k}: {en_flat[k]}')
          if missing_en:
              print(f'Keys missing in en ({len(missing_en)}):')
              for k in sorted(missing_en):
                  print(f'  {k}: {bg_flat[k]}')
          if missing_bg or missing_en:
              sys.exit(1)
          print('All translation keys are consistent between en and bg')
          "

  frontend-types:
    name: Frontend type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run check-types
        working-directory: frontend

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t lavbench-backend backend/
      - run: docker build -t lavbench-frontend frontend/

  docs-build:
    name: Build Sphinx documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r docs/requirements.txt
      - name: Build Sphinx
        env:
          API_SPEC_SKIP_FETCH: "true"
        run: cd docs && make html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sphinx-docs
          path: docs/build/
