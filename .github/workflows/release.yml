name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --bump ${{ inputs.bump }} --unreleased
        env:
          OUTPUT: CHANGELOG.md

      - name: Bump version in project files
        run: |
          VERSION="${{ steps.git-cliff.outputs.version }}"
          VERSION="${VERSION#v}"

          # Keep beta pre-release suffix
          VERSION_PEP440="${VERSION}b0"
          VERSION_SEMVER="${VERSION}-beta.0"

          sed -i 's/^version = ".*"/version = "'"$VERSION_PEP440"'"/' backend/pyproject.toml
          sed -i 's/"version": ".*"/"version": "'"$VERSION_SEMVER"'"/' frontend/package.json
          sed -i 's/^release = .*/release = "'"$VERSION_PEP440"'"/' docs/source/conf.py

      - name: Create Release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.git-cliff.outputs.version }}"
          TAG="${VERSION#v}"
          BRANCH="release/v${TAG}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md backend/pyproject.toml frontend/package.json docs/source/conf.py
          git commit -m "chore: release ${VERSION}"
          git push origin "$BRANCH"

          gh label create release --color 5319e7 --description "Release PR" 2>/dev/null || true
          curl -s -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "$(jq -n \
              --arg title "chore: release ${VERSION}" \
              --arg body "Automated release PR for ${VERSION}." \
              --arg head "$BRANCH" \
              --arg base "main" \
              '{title: $title, body: $body, head: $head, base: $base}'
            )"
