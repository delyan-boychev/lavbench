name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --bump ${{ inputs.bump }} --unreleased
        env:
          OUTPUT: CHANGELOG.md

      - name: Bump version in project files
        run: |
          VERSION="${{ steps.git-cliff.outputs.version }}"
          VERSION="${VERSION#v}"

          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' backend/pyproject.toml
          sed -i 's/"version": ".*"/"version": "'"$VERSION"'"/' frontend/package.json
          sed -i 's/^release = .*/release = "'"$VERSION"'"/' docs/source/conf.py

      - name: Ensure release label exists
        run: |
          gh label create release --color 5319e7 --description "Release PR" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Create Release PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "chore: release ${{ steps.git-cliff.outputs.version }}"
          title: "chore: release ${{ steps.git-cliff.outputs.version }}"
          body: "Automated release PR for ${{ steps.git-cliff.outputs.version }}."
          branch: "release/${{ steps.git-cliff.outputs.version }}"
          base: main
          labels: release
          delete-branch: true
