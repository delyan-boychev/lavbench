name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --bump --unreleased --tag ${{ inputs.bump }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Bump version in project files
        run: |
          VERSION="${{ steps.git-cliff.outputs.version }}"
          VERSION="${VERSION#v}"

          # Update backend/pyproject.toml
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' backend/pyproject.toml

          # Update frontend/package.json
          sed -i 's/"version": ".*"/"version": "'"$VERSION"'"/' frontend/package.json

      - name: Commit changelog + version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add CHANGELOG.md backend/pyproject.toml frontend/package.json
          git commit -m "chore: release ${{ steps.git-cliff.outputs.version }}"
          git tag ${{ steps.git-cliff.outputs.version }}
          git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.git-cliff.outputs.version }}
          body: ${{ steps.git-cliff.outputs.changelog }}
          generate_release_notes: true
