name: Post-Release

on:
  pull_request_target:
    types: [closed]
    branches:
      - main

jobs:
  tag:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version and create tag
        run: |
          VERSION=$(grep '^version = "' backend/pyproject.toml | head -1 | sed 's/^version = "//;s/"$//')
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "TAG=v${VERSION}" >> $GITHUB_ENV

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          body: ${{ steps.git-cliff.outputs.changelog }}
          generate_release_notes: true

      - name: Activate and build version on Read the Docs
        run: |
          curl -s -X PATCH \
            -H "Authorization: Token ${{ secrets.RTD_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://readthedocs.org/api/v3/projects/lavbench/versions/${{ env.TAG }}/" \
            -d '{"active": true}'
          curl -s -X POST \
            -H "Authorization: Token ${{ secrets.RTD_TOKEN }}" \
            "https://readthedocs.org/api/v3/projects/lavbench/versions/${{ env.TAG }}/builds/"
