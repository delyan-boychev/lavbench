repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        name: Ruff (backend lint)
        entry: bash -c 'cd backend && micromamba run -n lavbench_backend ruff check .'
        language: system
        files: ^backend/
        pass_filenames: false
      - id: ruff-format
        name: Ruff (backend format)
        entry: bash -c 'cd backend && micromamba run -n lavbench_backend ruff format --check .'
        language: system
        files: ^backend/
        pass_filenames: false
  - repo: local
    hooks:
      - id: mypy
        name: Mypy (backend)
        entry: bash -c 'cd backend && micromamba run -n lavbench_backend mypy . --no-incremental'
        language: system
        files: ^backend/
        pass_filenames: false
        require_serial: true
      - id: prettier
        name: Prettier (frontend)
        entry: npx prettier --write
        language: system
        files: ^frontend/.*\.(js|jsx|css|json|md)$
        pass_filenames: true
        require_serial: true
