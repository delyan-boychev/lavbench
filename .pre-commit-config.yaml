repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--check]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.9
    hooks:
      - id: prettier
        files: ^frontend/
        args: [--check]
        additional_dependencies:
          - prettier@3.4.2
